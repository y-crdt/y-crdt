on:
  push:
    # Sequence of patterns matched against refs/tags
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

name: Release packages

jobs:
  dist:
    name: create ${{ matrix.target }} C-FFI distribution
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        build: [ x86_64-linux, aarch64-macos, x86_64-windows ]
        include:
          - build: x86_64-linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            lib_name: libyrs.so
          - build: aarch64-macos
            os: macos-latest
            target: aarch64-apple-darwin
            lib_name: libyrs.dylib
          - build: x86_64-windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
            lib_name: yrs.dll
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: install cbindgen
        run: cargo install cbindgen
      - name: build release binary
        run: cargo build -p yffi --release --locked --target ${{ matrix.target }}
      - name: Strip release binary (linux and macos)
        if: matrix.build == 'x86_64-linux' || matrix.build == 'aarch64-macos'
        run: strip -x "./target/${{ matrix.target }}/release/${{ matrix.lib_name }}"
      - name: Build archive
        shell: bash
        run: |
          mkdir dist
          cp "target/${{ matrix.target }}/release/${{ matrix.lib_name }}" "dist/"
      - name: generate C bindings
        run: cbindgen --config ./yffi/cbindgen.toml --crate yffi --output "dist/libyrs.h" --lang C
      - uses: actions/upload-artifact@v4
        with:
          name: bins-${{ matrix.build }}
          path: dist

  release:
    name: release
    needs: [ dist ]
    runs-on: ubuntu-latest
    steps:
      - name: checkout sources
        uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - run: ls -al bins-*
      - name: Calculate tag name
        run: |
          name=dev
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            name=${GITHUB_REF:10}
          fi
          echo "val=$name" >> $GITHUB_OUTPUT
          echo TAG=$name >> $GITHUB_ENV
        id: tagname
      - name: Build archive
        shell: bash
        run: |
          set -ex

          rm -rf tmp
          mkdir tmp
          mkdir dist

          for dir in bins-* ; do
              platform=${dir#"bins-"}
              unset exe
              if [[ $platform =~ "windows" ]]; then
                  exe=".exe"
              fi
              pkgname=yffi-$TAG-$platform
              mkdir tmp/$pkgname
              # cp LICENSE README.md tmp/$pkgname
              mv bins-$platform/* tmp/$pkgname/

              if [ "$exe" = "" ]; then
                  tar cJf dist/$pkgname.tar.xz -C tmp $pkgname
              else
                  (cd tmp && 7z a -r ../dist/$pkgname.zip $pkgname)
              fi
          done
      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/*
          file_glob: true
          tag: ${{ steps.tagname.outputs.val }}
          overwrite: true
      - name: Extract version
        id: extract-version
        run: |
          printf "val=%s\n" "${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

  publish-crate:
    name: publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: cargo publish yrs
        run: cd ./yrs && cargo publish --all-features --token ${CRATES_TOKEN}
        env:
          CRATES_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: cargo publish yffi
        run: sleep 20 && cd ./yffi && cargo publish --token ${CRATES_TOKEN}
        env:
          CRATES_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-npm:
    name: publish to npmjs.org
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: install nodejs
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'v0.15.0'

      - name: build wasm
        run: wasm-pack build --release --target nodejs ./ywasm

      - name: npm publish
        run: cd ./ywasm/pkg && npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
